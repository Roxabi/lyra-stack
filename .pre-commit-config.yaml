repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: ruff check .
        language: system
        pass_filenames: false
      - id: format
        name: format check
        entry: ruff format --check .
        language: system
        pass_filenames: false
      - id: trufflehog
        name: trufflehog secret scan
        entry: trufflehog git file://. --only-verified --fail
        language: system
        pass_filenames: false
      - id: license
        name: license check
        entry: uv run tools/license_check.py
        language: system
        pass_filenames: false
        stages: [pre-push]
