# lyra-stack module registry
# Edit paths here if you clone modules to non-default locations.
# Run `make setup` to clone missing modules and register them.

[modules.lyra]
repo     = "git@github.com:Roxabi/lyra.git"
path     = "~/projects/lyra"
install  = "uv sync"
optional = false

[modules.voiceCLI]
repo     = "git@github.com:Roxabi/voiceCLI.git"
path     = "~/projects/voiceCLI"
install  = "uv sync"
optional = false

[modules.imageCLI]
repo     = "git@github.com:Roxabi/imageCLI.git"
path     = "~/projects/imageCLI"
install  = "uv sync"
optional = true

[modules.roxabi-vault]
repo     = "git@github.com:Roxabi/roxabi-vault.git"
path     = "~/projects/roxabi-vault"
install  = "uv sync"
optional = true
